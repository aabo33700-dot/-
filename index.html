<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الطلاب المجتهدون - في مادة العلوم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0072ce; --accent: #ff9800; --bg-light: #f4f7f6; --card-bg: #ffffff; --shadow: 0 4px 15px rgba(0,0,0,0.08); }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-light); margin: 0; color: #2c3e50; }
        .hero { text-align: center; padding: 50px 20px; background: linear-gradient(135deg, #0072ce, #004080); color: white; border-bottom-radius: 30px; }
        .curriculum-section { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .grades-horizontal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .grade-card { background: white; border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
        .grade-header { padding: 18px; background: #f8fafc; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .grade-content { display: none; padding: 15px; }
        .term-title { font-weight: bold; color: var(--primary); margin: 10px 0; border-right: 3px solid var(--accent); padding-right: 8px; }
        .lesson-item { background: #f8fafc; padding: 10px; margin-bottom: 8px; border-radius: 6px; }
        .resource-buttons { display: flex; gap: 5px; margin-top: 8px; }
        .res-btn { padding: 5px 8px; border-radius: 4px; color: white; font-size: 0.75rem; text-decoration: none; font-weight: bold; }
        .btn-summary { background-color: #28a745; }
        .btn-exam { background-color: #0072ce; }
        .btn-bank { background-color: #6f42c1; }
        .btn-video { background-color: #dc3545; }
        .active-display { display: block !important; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>الطلاب المجتهدون</h1>
        <h2>في مادة العلوم</h2>
    </section>

    <section class="curriculum-section">
        <!-- مثال للصف الرابع (يمكنك تكراره لباقي الصفوف بنفس الطريقة) -->
        <div class="grades-horizontal-grid">
            <div class="grade-card">
                <div class="grade-header" onclick="toggleElement('grade4')">
                    <span>🔹 الصف الرابع الابتدائي</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div id="grade4" class="grade-content">
                    <div class="term-title">الفصل الدراسي الأول</div>
                    <div class="lesson-item">
                        <div style="font-weight:bold;">الدرس الأول: التكيف والبقاء</div>
                        <div class="resource-buttons">
                            <a href="https://docs.google.com/document/d/1LwtpGvVMiC126fEwU7mgryJQBpTCp7JAvKhr77OTjko/edit?usp=sharing" class="res-btn btn-summary">الملخص</a>
                            <a href="#" class="res-btn btn-exam">الاختبار</a>
                            <a href="#" class="res-btn btn-bank">الأسئلة</a>
                            <a href="#" class="res-btn btn-video">الشرح</a>
                        </div>
                    </div>
                </div>
            </div>
            <!-- كرر كود الصف الرابع هنا لبقية الصفوف مع تغيير الـ id -->
        </div>
    </section>

    <script>
        function toggleElement(id) { document.getElementById(id).classList.toggle('active-display'); }
    </script>
</body>
</html>
